<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HDHTAN ID System & QR Validator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #0f172a; }
        .id-card { 
            width: 320px; height: 500px; background: white; border-radius: 12px; 
            position: relative; overflow: hidden; border: 1px solid #e2e8f0;
            display: flex; flex-direction: column;
        }
        /* WATERMARK STYLE */
        .watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 250px;
            opacity: 0.15; /* Restored visibility */
            z-index: 1;
            pointer-events: none;
        }
        .content-layer { position: relative; z-index: 2; height: 100%; display: flex; flex-direction: column; }
    </style>
</head>
<body class="p-10">

    <div class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-10">
        
        <!-- CONTROL PANEL -->
        <div class="bg-slate-800 p-6 rounded-xl text-white">
            <h2 class="text-xl font-bold mb-4">Card Configuration</h2>
            <input id="in-name" type="text" placeholder="Full Name" class="w-full p-2 mb-2 rounded bg-slate-900 border border-slate-700">
            <input id="in-pos" type="text" placeholder="Rank/Position" class="w-full p-2 mb-2 rounded bg-slate-900 border border-slate-700">
            <button onclick="window.print()" class="w-full bg-emerald-600 py-2 mt-4 rounded font-bold hover:bg-emerald-500">Export as PDF/Print</button>
        </div>

        <!-- PREVIEW -->
        <div class="flex gap-4">
            <!-- FRONT -->
            <div id="front" class="id-card p-4">
                <div class="watermark">
                    <svg viewBox="0 0 100 100" fill="#15803d"><path d="M50 5 L90 25 L90 75 L50 95 L10 75 L10 25 Z"/></svg>
                </div>
                <div class="content-layer">
                    <div class="text-center border-b pb-2">
                        <h1 class="text-xl font-extrabold text-emerald-900">HDHTAN</h1>
                        <p class="text-[8px] font-bold uppercase text-red-600">In Collaboration with Federal Government (PPP)</p>
                        <p class="text-[9px] font-bold uppercase bg-slate-100 mt-2 px-1 rounded">Presidential Order-001</p>
                    </div>
                    <div class="flex-grow flex flex-col items-center justify-center">
                        <div class="w-24 h-24 bg-slate-200 rounded border-2 border-emerald-800 mb-4"></div>
                        <h3 id="out-name" class="font-bold text-lg uppercase">ABUBAKAR MOHAMMED</h3>
                        <p id="out-pos" class="text-emerald-700 font-semibold uppercase">ADMIN</p>
                    </div>
                </div>
            </div>

            <!-- BACK -->
            <div id="back" class="id-card p-4">
                <div class="watermark">
                    <svg viewBox="0 0 100 100" fill="#15803d"><path d="M50 5 L90 25 L90 75 L50 95 L10 75 L10 25 Z"/></svg>
                </div>
                <div class="content-layer justify-between">
                    <div class="text-center font-bold text-red-700 text-sm">HDHTAN SPECIAL TASKFORCE</div>
                    <div class="text-center text-xs text-slate-600">If found, please return to the nearest police station or contact HQ.</div>
                    <div class="text-center text-[10px] text-slate-400">© 2026 Official Identity</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('in-name').addEventListener('input', (e) => document.getElementById('out-name').innerText = e.target.value);
        document.getElementById('in-pos').addEventListener('input', (e) => document.getElementById('out-pos').innerText = e.target.value);
    </script>
</body>
</html>
