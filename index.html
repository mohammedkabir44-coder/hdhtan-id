<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HDHTAN Official Validator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-8">

    <div id="validator-ui" class="hidden max-w-md mx-auto bg-slate-800 p-8 rounded-2xl border border-emerald-500 text-center">
        <h2 class="text-2xl font-bold text-emerald-400">VALIDATION RESULT</h2>
        <div id="result-content" class="mt-6 text-left space-y-4">
            <p><strong>Name:</strong> <span id="v-name">Loading...</span></p>
            <p><strong>Rank:</strong> <span id="v-rank">Loading...</span></p>
        </div>
    </div>

    <script>
        // YOUR LIVE DATA SOURCE
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSaK6KrGDiuYMXgxnSlJ47PS_BWFTwe1sw5buJcLtw_ENaHszXtFJh2MpsLAEtNmF98ge70Pgiendtn/pub?output=csv';

        async function performValidation() {
            const urlParams = new URLSearchParams(window.location.search);
            const idToFind = urlParams.get('id'); // ID taken from the QR code

            if (!idToFind) return;

            document.getElementById('validator-ui').classList.remove('hidden');

            try {
                const response = await fetch(CSV_URL);
                const data = await response.text();
                const rows = data.split('\n');
                
                let found = false;
                for (let i = 1; i < rows.length; i++) {
                    const [id, name, rank] = rows[i].split(',');
                    if (id && id.trim() === idToFind.trim()) {
                        document.getElementById('v-name').innerText = name;
                        document.getElementById('v-rank').innerText = rank;
                        found = true;
                        break;
                    }
                }
                if (!found) document.getElementById('v-name').innerText = "ID NOT FOUND IN DATABASE";
            } catch (err) {
                document.getElementById('v-name').innerText = "CONNECTION ERROR";
            }
        }

        // Run on page load
        performValidation();
    </script>
</body>
</html>
