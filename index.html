<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HDHTAN Taraba - Portrait ID Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'DM Sans', sans-serif; background-color: #0b0f19; color: #f1f5f9; }
        h1, h2, h3, h4, .font-heading { font-family: 'Poppins', sans-serif; }
        .id-card-wrapper { width: 315px; height: 480px; border-radius: 14px; position: relative; overflow: hidden; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5); background: #ffffff; color: #1e293b; border: 1px solid #cbd5e1; }
        .vertical-flag-ruler { position: absolute; top: 0; left: 0; width: 24px; height: 100%; display: flex; flex-direction: row; z-index: 30; }
        .flag-green { background-color: #15803d; width: 33.33%; height: 100%; }
        .flag-white { background-color: #ffffff; width: 33.34%; height: 100%; }
        .watermark-bg { position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%); width: 220px; height: 220px; opacity: 0.08; pointer-events: none; z-index: 0; }
        .front-watermark { left: 54%; }
        .red-outline-box { background-color: transparent !important; border: 2px solid #dc2626; border-radius: 8px; padding: 10px; }
        .card-label { font-size: 9px; font-weight: 800; color: #dc2626; letter-spacing: 0.04em; text-transform: uppercase; }
        .card-value { font-size: 14px; font-weight: 700; color: #0f172a; text-transform: uppercase; min-height: 20px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="lg:col-span-7 flex flex-col md:flex-row items-center justify-center gap-8 w-full">
        
        <div class="id-card-wrapper flex flex-col justify-between p-4 pl-9 bg-white text-slate-800 relative">
            <div class="vertical-flag-ruler">
                <div class="flag-green"></div><div class="flag-white"></div><div class="flag-green"></div>
            </div>
            <img src="hdhtan logo.jpg" alt="Watermark" class="watermark-bg front-watermark">

            <div class="text-center border-b border-emerald-800/20 pb-2 z-10 w-full">
                <div class="flex items-center justify-center gap-1.5 w-full">
                    <div class="w-12 h-12 flex-shrink-0"><img src="https://upload.wikimedia.org/wikipedia/commons/b/bc/Coat_of_arms_of_Nigeria.svg" alt="Coat of Arms" class="w-full h-full object-contain"></div>
                    <div class="flex flex-col items-start text-left leading-none">
                        <h2 class="text-[25px] font-extrabold text-emerald-800 uppercase leading-none font-heading">HDHTAN</h2>
                        <div class="text-[6.8px] font-black text-red-600 uppercase tracking-tight leading-none mt-[1px] font-heading">IN COLLABORATION WITH FEDERAL GOVERNMENT (PPP)</div>
                    </div>
                </div>
                <h3 class="text-[10px] font-black text-slate-950 uppercase leading-tight tracking-tight px-1 mt-2 mb-1">special taskforce against economic sabotage and multiple taxation</h3>
                <p class="text-[9px] font-black text-red-600 uppercase tracking-widest bg-slate-100 py-0.5 rounded font-heading">presidential order-001</p>
            </div>

            <div class="flex flex-col flex-1 my-2 justify-between z-10 w-full">
                <div class="w-24 h-26 border-2 border-emerald-700 rounded bg-slate-100 overflow-hidden shadow-sm relative mx-auto mb-2">
                    <img id="card-photo" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23f1f5f9'/></svg>" alt="Passport" class="w-full h-full object-cover">
                </div>
                <div class="red-outline-box space-y-1.5 w-full px-2.5 text-center">
                    <div>
                        <div class="card-label">NAME:</div>
                        <div id="card-name" class="card-value font-bold tracking-wide"></div>
                    </div>
                    <div>
                        <div class="card-label">RANK / POSITION:</div>
                        <div id="card-position" class="card-value font-bold tracking-wide text-emerald-800"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="id-card-wrapper flex flex-col justify-between p-4 bg-white text-slate-800 relative">
            <img src="hdhtan logo.jpg" alt="Watermark" class="watermark-bg">
            <div class="text-center border-b border-red-600/20 pb-2 z-10 w-full">
                <span class="text-[12px] font-black text-red-600 uppercase tracking-wider block font-heading leading-tight">HDHTAN SPECIAL TASKFORCE<br>TARABA STATE</span>
            </div>
            </div>

    </div>

    <script>
        // ... (Keep your existing script for input handlers) ...
        updateCardText();
    </script>
</body>
</html>
